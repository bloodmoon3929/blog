events {
    worker_connections 1024;
}

stream {
    # IP 기반 50:50 로드 밸런싱
    upstream backend {
        hash $remote_addr consistent;
        server 127.0.0.1:8081 weight=1;  # GitHub
        server 127.0.0.1:8082 weight=1;  # Local
    }
    
    server {
        listen 2052;
        proxy_pass backend;
    }
}

http {
    # GitHub Pages IP (DNS 우회)
    upstream github_pages {
        server 185.199.108.153:443;
        server 185.199.109.153:443;
        server 185.199.110.153:443;
        server 185.199.111.153:443;
    }

    # GitHub Pages 프록시 (내부 포트 8081)
    server {
        listen 127.0.0.1:8081;
        
        location / {
            # 슬래시 추가 처리
            rewrite ^([^.]*[^/])$ $1/ permanent;
            
            # IP 직접 사용
            proxy_pass https://github_pages/blog$request_uri;
            
            # SSL 설정
            proxy_ssl_server_name on;
            proxy_ssl_name bloodmoon3929.github.io;
            proxy_ssl_verify off;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # 헤더 설정 (중요!)
            proxy_set_header Host bloodmoon3929.github.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Accept-Encoding "";
            
            # 리다이렉트 처리
            proxy_redirect https://bloodmoon3929.github.io/blog/ /;
            proxy_redirect https://bloodmoon3929.github.io/blog /;
            
            # 타임아웃
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # 에러 처리
            proxy_intercept_errors on;
            error_page 502 503 504 = @fallback_local;
            
            add_header X-Backend "github" always;
        }
        
        # GitHub 실패 시 로컬로 폴백
        location @fallback_local {
            proxy_pass http://quartz-proxy:3000;
            proxy_set_header Host $host;
            add_header X-Backend "github-fallback-to-local" always;
        }
    }
    
    # 로컬 Quartz 프록시 (내부 포트 8082)
    server {
        listen 127.0.0.1:8082;
        
        location / {
            proxy_pass http://quartz-proxy:3000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            add_header X-Backend "local" always;
        }
    }
}
