name: Copy Files and Deploy Quartz

on:
  push:
    branches:
      - v4

permissions:
  contents: write  # 파일 복사 및 커밋을 위해 write 권한 필요
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  process-and-build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - List directories
        run: |
          echo "Listing repository structure:"
          ls -la
          echo "Listing src directory if exists:"
          ls -la src || echo "src directory not found"
      
      - name: Set up content structure
        run: |
          mkdir -p content
          mkdir -p content/assets
          
          if [ -d "src/site/notes" ]; then
            cp -r src/site/notes/* content/ || echo "No files to copy from notes"
          fi
          
          if [ -d "src/site/img/user/첨부파일" ]; then
            cp -r src/site/img/user/첨부파일/* content/assets/ || echo "No files to copy from attachments"
          fi
      
      - name: Update image paths in markdown files
        run: |
          if [ -d "content" ]; then
            find content -type f -name "*.md" -exec sed -i 's|img/user/%EC%B2%A8%EB%B6%80%ED%8C%8C%EC%9D%BC/||g' {} \; || echo "No markdown files to update"
          fi
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ || echo "No content to add"
          git commit -m "Copy files to content folder structure" || echo "No changes to commit"
          git push || echo "Failed to push changes"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Quartz
        run: npx quartz build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: process-and-build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4